<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | Avinash Editz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050505; color: white; font-family: 'Inter', sans-serif; overflow: hidden; }
        .gradient-text { background: linear-gradient(135deg, #fff 30%, #3de500 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .circle { position: absolute; border-radius: 50%; filter: blur(80px); z-index: -1; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">
    <div class="circle w-64 h-64 bg-[#3de500]/10 top-1/4 left-1/4"></div>
    <div class="circle w-96 h-96 bg-[#db2777]/5 bottom-1/4 right-1/4"></div>

    <div class="text-center p-8 max-w-lg">
        <h1 class="text-9xl font-black gradient-text mb-4">404</h1>
        <h2 class="text-2xl font-bold mb-4">You've reached a hidden frame.</h2>
        <p class="text-gray-400 mb-8">The content you're looking for was moved or doesn't exist in our current timeline.</p>
        
        <div id="status" class="text-xs font-mono text-[#3de500] uppercase tracking-[0.3em] mb-8 animate-pulse">
            Redirecting to home in 3s...
        </div>

        <div class="flex gap-4 justify-center">
            <a href="./index.html" class="px-6 py-3 bg-[#3de500] text-black rounded-full font-bold text-sm hover:scale-105 transition-transform">Go Home</a>
            <a href="./admin.html" class="px-6 py-3 bg-white/5 border border-white/10 rounded-full font-bold text-sm hover:bg-white/10 transition-all">Admin Access</a>
        </div>
    </div>

    <script type="text/javascript">
        // Intelligent Redirection Logic for GitHub Pages
        const path = window.location.pathname;
        const statusEl = document.getElementById('status');
        
        // Timer for the user to see the nice 404 page before redirect
        let seconds = 3;
        const countdown = setInterval(() => {
            seconds--;
            if (seconds <= 0) {
                clearInterval(countdown);
                performRedirect();
            } else {
                statusEl.innerText = `Redirecting in ${seconds}s...`;
            }
        }, 1000);

        function performRedirect() {
            // If the user was trying to reach admin (even without extension)
            if (path.includes('/admin')) {
                window.location.replace('./admin.html');
            } else {
                // Default fallback to index.html
                // We use relative path to handle subfolder deployments (e.g. /repo/index.html)
                window.location.replace('./index.html');
            }
        }
    </script>
</body>
</html>
